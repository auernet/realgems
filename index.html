<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RealGems — Antwerp</title>
<meta name="description" content="RealGems — an Antwerp house for exceptional, certified stones. Opening soon." />
<meta name="theme-color" content="#fbfbfa" />
<link rel="icon" type="image/png" href="assets/realgems-mark.png" />

<!-- Open Graph -->
<meta property="og:title" content="RealGems — Antwerp" />
<meta property="og:description" content="An Antwerp house for exceptional, certified stones. Opening soon." />
<meta property="og:type" content="website" />
<meta property="og:image" content="assets/realgems-mark.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#fbfbfa; --ink:#161616; --mut:#8a8a86;
    --line:rgba(0,0,0,.12); --glow:rgba(120,150,210,.18);
  }
  body.night{
    --bg:#0a0a0c; --ink:#f0eee9; --mut:#8b897f;
    --line:rgba(255,255,255,.14); --glow:rgba(150,180,255,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Inter",-apple-system,"Helvetica Neue",Arial,sans-serif;
    font-weight:300; -webkit-font-smoothing:antialiased;
    transition:background .6s ease,color .6s ease;
    overflow:hidden;
  }

  .stage{position:relative;height:100dvh;width:100vw;display:flex;flex-direction:column;align-items:center;justify-content:center}

  /* day / night toggle */
  .toggle{
    position:absolute;top:26px;right:28px;z-index:5;
    width:38px;height:38px;border-radius:50%;
    background:none;border:.5px solid var(--line);color:var(--ink);
    cursor:pointer;font-size:15px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    transition:border-color .4s ease,color .4s ease,transform .25s ease;
  }
  .toggle:hover{transform:rotate(18deg)}

  /* the mark */
  .markwrap{position:relative;display:flex;align-items:center;justify-content:center}
  .markwrap::before{
    content:"";position:absolute;inset:-28% -28%;
    background:radial-gradient(circle at 50% 46%,var(--glow),transparent 62%);
    filter:blur(8px);z-index:0;opacity:.9;
    transition:opacity .6s ease;
  }
  .mark{
    position:relative;z-index:1;
    width:clamp(108px,16vw,160px);height:auto;display:block;
    animation:breathe 9s ease-in-out infinite alternate;
    transform-origin:center;
  }
  body.night .mark{filter:brightness(1.08) saturate(1.04)}
  @keyframes breathe{from{transform:scale(1)}to{transform:scale(1.055)}}

  /* wordmark + caption */
  .wordmark{
    margin-top:38px;
    font-weight:200;font-size:clamp(30px,6.4vw,52px);
    letter-spacing:.34em;text-indent:.34em;line-height:1;
    text-transform:lowercase;white-space:nowrap;
  }
  .rule{width:42px;height:.5px;background:var(--line);margin:26px 0 22px}
  .soon{
    font-size:11px;font-weight:400;letter-spacing:.5em;text-indent:.5em;
    text-transform:uppercase;color:var(--mut);
  }

  /* footer locale */
  .locale{
    position:absolute;bottom:30px;left:0;right:0;text-align:center;
    font-size:10px;font-weight:400;letter-spacing:.42em;text-indent:.42em;
    text-transform:uppercase;color:var(--mut);
  }

  /* entrance */
  .fade{opacity:0;transform:translateY(8px);animation:rise 1.1s cubic-bezier(.22,.61,.36,1) forwards}
  .d1{animation-delay:.10s}.d2{animation-delay:.34s}.d3{animation-delay:.54s}.d4{animation-delay:.72s}
  @keyframes rise{to{opacity:1;transform:none}}

  @media (prefers-reduced-motion:reduce){
    .mark{animation:none}
    .fade{animation:none;opacity:1;transform:none}
  }
</style>
</head>
<body>
  <main class="stage">
    <button class="toggle fade d1" id="toggle" aria-label="Toggle light and dark">&#9790;</button>

    <div class="markwrap fade d1">
      <img class="mark" src="assets/realgems-mark.png" alt="RealGems" width="502" height="710" />
    </div>

    <div class="wordmark fade d2">realgems</div>
    <div class="rule fade d3" aria-hidden="true"></div>
    <div class="soon fade d3">Coming&nbsp;Soon</div>

    <div class="locale fade d4">Antwerp</div>
  </main>

<script>
  (function(){
    var b=document.body, t=document.getElementById('toggle');
    var SUN='☀', MOON='☾';
    var saved=null; try{saved=localStorage.getItem('rg-mode')}catch(e){}
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var night = saved ? saved==='night' : prefersDark;
    apply(night);
    t.addEventListener('click',function(){ night=!night; apply(night); try{localStorage.setItem('rg-mode',night?'night':'day')}catch(e){} });
    function apply(isNight){
      b.classList.toggle('night',isNight);
      t.innerHTML = isNight ? SUN : MOON;
      var tc=document.querySelector('meta[name="theme-color"]'); if(tc) tc.setAttribute('content', isNight ? '#0a0a0c' : '#fbfbfa');
    }
  })();
</script>
</body>
</html>

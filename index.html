<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RealGems — Antwerp</title>
<meta name="description" content="RealGems — Only the Finest. An Antwerp house for exceptional, certified stones. Opening soon." />
<meta name="theme-color" content="#fbfbfa" />

<link rel="icon" href="favicon.ico?v=2" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=2" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=2" />

<!-- Open Graph -->
<meta property="og:title" content="RealGems — Only the Finest" />
<meta property="og:description" content="An Antwerp house for exceptional, certified stones. Opening soon." />
<meta property="og:type" content="website" />
<meta property="og:image" content="assets/realgems-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#fbfbfa; --ink:#222020; --mut:#8a857e;
    --line:rgba(0,0,0,.14); --glow:rgba(120,150,210,.07);
  }
  body.night{
    --bg:#0b0b0d; --ink:#f1efe9; --mut:#8f8c82;
    --line:rgba(255,255,255,.16); --glow:rgba(178,194,226,.17);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Cinzel",Georgia,"Times New Roman",serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    transition:background .6s ease,color .6s ease;
    overflow:hidden;
  }

  .stage{position:relative;height:100dvh;width:100vw;display:flex;flex-direction:column;align-items:center;justify-content:center}

  /* day / night toggle */
  .toggle{
    position:absolute;top:26px;right:28px;z-index:5;
    width:38px;height:38px;border-radius:50%;
    background:none;border:.5px solid var(--line);color:var(--ink);
    cursor:pointer;font-size:15px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    transition:border-color .4s ease,color .4s ease,transform .25s ease;
  }
  .toggle:hover{transform:rotate(18deg)}

  /* the gem mark */
  .markwrap{position:relative;display:flex;align-items:center;justify-content:center}
  .markwrap::before{
    content:"";position:absolute;inset:-30% -30%;
    background:radial-gradient(circle at 50% 46%,var(--glow),transparent 62%);
    filter:blur(8px);z-index:0;opacity:.9;transition:opacity .6s ease;
  }
  .mark{
    position:relative;z-index:1;
    width:clamp(108px,14.5vw,158px);height:auto;display:block;
    animation:breathe 9s ease-in-out infinite alternate;transform-origin:center;
  }
  body.night .mark{filter:brightness(1.05) drop-shadow(0 6px 26px rgba(120,150,210,.22))}
  @keyframes breathe{from{transform:scale(1)}to{transform:scale(1.055)}}

  /* wordmark — Cinzel, matching the RealGems logo (Trajan) */
  .wordmark{
    margin-top:30px;
    font-weight:600;font-size:clamp(31px,6.2vw,54px);
    letter-spacing:.06em;line-height:1;white-space:nowrap;
  }
  .tagline{
    margin-top:14px;
    font-weight:400;font-size:clamp(11px,1.5vw,13px);
    letter-spacing:.34em;text-indent:.34em;text-transform:uppercase;color:var(--mut);
  }
  .rule{width:46px;height:.5px;background:var(--line);margin:30px 0 20px}
  .soon{
    font-weight:500;font-size:11px;letter-spacing:.42em;text-indent:.42em;
    text-transform:uppercase;color:var(--mut);
  }

  .locale{
    position:absolute;bottom:30px;left:0;right:0;text-align:center;
    font-weight:400;font-size:10px;letter-spacing:.4em;text-indent:.4em;
    text-transform:uppercase;color:var(--mut);
  }

  /* entrance */
  .fade{opacity:0;transform:translateY(8px);animation:rise 1.1s cubic-bezier(.22,.61,.36,1) forwards}
  .d1{animation-delay:.10s}.d2{animation-delay:.34s}.d3{animation-delay:.52s}.d4{animation-delay:.68s}.d5{animation-delay:.82s}
  @keyframes rise{to{opacity:1;transform:none}}

  @media (prefers-reduced-motion:reduce){
    .mark{animation:none}
    .fade{animation:none;opacity:1;transform:none}
  }
</style>
</head>
<body>
  <main class="stage">
    <button class="toggle fade d1" id="toggle" aria-label="Toggle light and dark">&#9790;</button>

    <div class="markwrap fade d1">
      <img class="mark" src="assets/realgems-mark.svg" alt="RealGems" width="710" height="660" />
    </div>

    <div class="wordmark fade d2">RealGems</div>
    <div class="tagline fade d3">Only the Finest</div>

    <div class="rule fade d4" aria-hidden="true"></div>
    <div class="soon fade d4">Coming&nbsp;Soon</div>

    <div class="locale fade d5">Antwerp</div>
  </main>

<script>
  (function(){
    var b=document.body, t=document.getElementById('toggle');
    var SUN='☀', MOON='☾';
    var saved=null; try{saved=localStorage.getItem('rg-mode')}catch(e){}
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var night = saved ? saved==='night' : prefersDark;
    apply(night);
    t.addEventListener('click',function(){ night=!night; apply(night); try{localStorage.setItem('rg-mode',night?'night':'day')}catch(e){} });
    function apply(isNight){
      b.classList.toggle('night',isNight);
      t.innerHTML = isNight ? SUN : MOON;
      var tc=document.querySelector('meta[name="theme-color"]'); if(tc) tc.setAttribute('content', isNight ? '#0a0a0c' : '#fbfbfa');
    }
  })();
</script>
</body>
</html>
